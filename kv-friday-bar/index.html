<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="/images/logo.ico">
    <meta name="Lucas Hanson" content="Mini challenge for a Kraftvaerk Friday bar">
    <title>Ghost Catcher</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0a0a0a;
            color: #ccc;
            font-family: 'Space Mono', monospace;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        #ghost {
            position: absolute;
            font-size: 3rem;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.2));
            z-index: 10;
        }

        #secret-message {
            display: none;
            text-align: center;
            animation: fadeIn 2s ease-in forwards;
            padding: 20px;
        }

        .larger-text {
            font-size: 1.5rem;
            text-shadow: 0 0 8px rgb(226, 226, 226);
            margin-bottom: 10px;
        }

        .hint {
            color: #444;
            font-size: 0.8rem;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        .floating {
            animation: float 3s ease-in-out infinite;
        }
    </style>
</head>
<body>

    <div id="ghost" class="floating">👻</div>

    <div id="secret-message">
        <div class="larger-text">You found it</div>
        <p>The secret message is: "½1#$"</p>
    </div>

    <script>
        let taps = 0;
        const ghost = document.getElementById('ghost');
        const message = document.getElementById('secret-message');

        function moveGhost() {
            // Keep ghost away from edges
            const padding = 60;
            const x = Math.random() * (window.innerWidth - padding * 2) + padding;
            const y = Math.random() * (window.innerHeight - padding * 2) + padding;
            
            ghost.style.left = x + 'px';
            ghost.style.top = y + 'px';
            
            // Randomly flip or rotate slightly
            const rotate = (Math.random() - 0.5) * 40;
            ghost.style.transform = `rotate(${rotate}deg)`;
        }

        // Initial position
        moveGhost();

        // Move ghost periodically even if not tapped to draw attention
        let autoMove = setInterval(moveGhost, 500);

        ghost.addEventListener('touchstart', handleTap);
        ghost.addEventListener('click', handleTap);

        function handleTap(e) {
            e.preventDefault();
            taps++;
            
            // Speed up movement on tap
            clearInterval(autoMove);
            moveGhost();
            autoMove = setInterval(moveGhost, 2500 - (taps * 500));

            if (taps >= 3) {
                clearInterval(autoMove);
                ghost.style.display = 'none';
                message.style.display = 'block';
                document.body.style.backgroundColor = '#000';
            }
        }
    </script>
</body>
</html>
